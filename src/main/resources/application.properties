# Project name
spring.application.name=springboot-layered-architecture-demo

# Server port(kon port a run hobe)
server.port=5454



# ===============================
# =   DATABASE CONFIGURATION    =
# ===============================

# "jdbc:mysql" MySQL use korchi
# "localhost" nijer computer
# "3306" MySQL default port
# "springboot" Database Name
spring.datasource.url=jdbc:mysql://localhost:3306/springboot
spring.datasource.username=root
spring.datasource.password=Pollob@
# Eta "MySQL Driver dependency" er sathe ase. Note: Onek somoy na dileo auto detect hoy.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# ===============================
# =   JPA / HIBERNATE CONFIG    =
# ===============================

# er kaj, Hibernate automatically table create/update korbe. 
# "update" new field add korle table update korbe.
spring.jpa.hibernate.ddl-auto=update
# Console a SQL query show korbe.
spring.jpa.show-sql=true
# "Hibernate" k bola hocche tumi MySQL er language use koro.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect